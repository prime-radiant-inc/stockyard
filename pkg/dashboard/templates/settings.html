{{template "layout-start" .}}
            <div class="max-w-2xl mx-auto">
                <div class="bg-white rounded-lg shadow border border-gray-200">
                    <div class="p-4 border-b border-gray-200">
                        <h1 class="text-xl font-semibold text-gray-900">Settings</h1>
                    </div>

                    <div class="p-6 space-y-6">
                        <!-- Instance Info -->
                        <div>
                            <h2 class="text-sm font-medium text-gray-900 mb-3">Instance Information</h2>
                            <dl class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <dt class="text-gray-500">Instance ID</dt>
                                    <dd class="font-mono text-gray-900">{{.InstanceID}}</dd>
                                </div>
                                <div>
                                    <dt class="text-gray-500">Version</dt>
                                    <dd class="font-mono text-gray-900">{{.Version}}</dd>
                                </div>
                            </dl>
                        </div>

                        <hr class="border-gray-200">

                        <!-- ZFS Config -->
                        <div>
                            <h2 class="text-sm font-medium text-gray-900 mb-3">Storage (ZFS)</h2>
                            <dl class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <dt class="text-gray-500">Pool</dt>
                                    <dd class="font-mono text-gray-900">{{.ZFSPool}}</dd>
                                </div>
                                <div>
                                    <dt class="text-gray-500">VMs Path</dt>
                                    <dd class="font-mono text-gray-900">{{.ZFSVMsPath}}</dd>
                                </div>
                            </dl>
                        </div>

                        <hr class="border-gray-200">

                        <!-- Network Config -->
                        <div>
                            <h2 class="text-sm font-medium text-gray-900 mb-3">Network</h2>
                            <dl class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <dt class="text-gray-500">Bridge</dt>
                                    <dd class="font-mono text-gray-900">{{.BridgeName}}</dd>
                                </div>
                                <div>
                                    <dt class="text-gray-500">VM Subnet</dt>
                                    <dd class="font-mono text-gray-900">{{.VMSubnet}}</dd>
                                </div>
                            </dl>
                        </div>
                    </div>
                </div>
            </div>
{{template "layout-end" .}}
