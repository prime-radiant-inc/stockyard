{{define "sidebar"}}
<nav id="sidebar"
     x-show="showSidebar"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="-translate-x-full lg:translate-x-0"
     x-transition:enter-end="translate-x-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="translate-x-0"
     x-transition:leave-end="-translate-x-full lg:translate-x-0"
     @click.away="if (window.innerWidth < 1024) showSidebar = false"
     class="w-48 bg-white border-r border-gray-200 flex flex-col fixed lg:static inset-y-0 left-0 z-40 lg:z-0 transform lg:transform-none"
     x-cloak
     :class="{'lg:flex': true}">
    <div class="flex-1 py-4 mt-14 lg:mt-0">
        <a href="/" @click="if (window.innerWidth < 1024) showSidebar = false" class="flex items-center gap-3 px-4 py-2 text-gray-700 hover:bg-gray-100 {{if eq .ActiveNav "fleet"}}bg-blue-50 text-blue-700 border-r-2 border-blue-700{{end}}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
            <span>Fleet</span>
        </a>
        <a href="/activity" @click="if (window.innerWidth < 1024) showSidebar = false" class="flex items-center gap-3 px-4 py-2 text-gray-700 hover:bg-gray-100 {{if eq .ActiveNav "activity"}}bg-blue-50 text-blue-700 border-r-2 border-blue-700{{end}}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            <span>Activity</span>
        </a>
        <a href="/resources" @click="if (window.innerWidth < 1024) showSidebar = false" class="flex items-center gap-3 px-4 py-2 text-gray-700 hover:bg-gray-100 {{if eq .ActiveNav "resources"}}bg-blue-50 text-blue-700 border-r-2 border-blue-700{{end}}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
            </svg>
            <span>Resources</span>
        </a>
        <a href="/settings" @click="if (window.innerWidth < 1024) showSidebar = false" class="flex items-center gap-3 px-4 py-2 text-gray-700 hover:bg-gray-100 {{if eq .ActiveNav "settings"}}bg-blue-50 text-blue-700 border-r-2 border-blue-700{{end}}">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            <span>Settings</span>
        </a>
    </div>
</nav>
{{end}}
