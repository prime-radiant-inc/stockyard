syntax = "proto3";

package stockyard.v1;

option go_package = "github.com/obra/stockyard/pkg/api/v1";

service Stockyard {
    rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
    rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
    rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
    rpc StopTask(StopTaskRequest) returns (StopTaskResponse);
    rpc RestartTask(RestartTaskRequest) returns (RestartTaskResponse);
    rpc DestroyTask(DestroyTaskRequest) returns (DestroyTaskResponse);

    rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
    rpc ListSnapshots(ListSnapshotsRequest) returns (ListSnapshotsResponse);
    rpc RestoreSnapshot(RestoreSnapshotRequest) returns (RestoreSnapshotResponse);

    rpc GetLogs(GetLogsRequest) returns (stream LogEntry);

    // Queue management
    rpc CreateQueue(CreateQueueRequest) returns (CreateQueueResponse);
    rpc ListQueues(ListQueuesRequest) returns (ListQueuesResponse);
    rpc GetQueueStatus(GetQueueStatusRequest) returns (GetQueueStatusResponse);
    rpc FlushQueue(FlushQueueRequest) returns (FlushQueueResponse);
    rpc ResumeQueue(ResumeQueueRequest) returns (ResumeQueueResponse);
    rpc DestroyQueue(DestroyQueueRequest) returns (DestroyQueueResponse);

    // Command execution
    rpc QueueCommand(QueueCommandRequest) returns (QueueCommandResponse);
    rpc GetCommandStatus(GetCommandStatusRequest) returns (GetCommandStatusResponse);
    rpc StreamCommandOutput(StreamCommandOutputRequest) returns (stream CommandOutputChunk);
    rpc StreamQueueOutput(StreamQueueOutputRequest) returns (stream QueueOutputChunk);
}

message CreateTaskRequest {
    string name = 1;
    reserved 2;  // was: command (now use QueueCommand after task creation)
    map<string, string> vm_env = 3;  // VM-level env injected via cloud-init
    int32 cpus = 4;
    string memory = 5;
    bool no_tailscale = 6;
    string tailscale_auth_key = 7;  // Optional: override 1Password lookup
    repeated string ssh_authorized_keys = 8;  // SSH public keys for VM access
}

message CreateTaskResponse {
    string task_id = 1;
    string tailscale_hostname = 2;
}

message GetTaskRequest {
    string task_id = 1;
}

message GetTaskResponse {
    Task task = 1;
}

message ListTasksRequest {
    string status = 1;
}

message ListTasksResponse {
    repeated Task tasks = 1;
}

message StopTaskRequest {
    string task_id = 1;
}

message StopTaskResponse {}

message RestartTaskRequest {
    string task_id = 1;
}

message RestartTaskResponse {}

message DestroyTaskRequest {
    string task_id = 1;
}

message DestroyTaskResponse {}

message CreateSnapshotRequest {
    string task_id = 1;
    string label = 2;
}

message CreateSnapshotResponse {
    string snapshot_name = 1;
}

message ListSnapshotsRequest {
    string task_id = 1;
}

message ListSnapshotsResponse {
    repeated Snapshot snapshots = 1;
}

message RestoreSnapshotRequest {
    string task_id = 1;
    string snapshot_name = 2;
}

message RestoreSnapshotResponse {}

message GetLogsRequest {
    string task_id = 1;
    bool follow = 2;
    int32 tail = 3;
}

message LogEntry {
    string timestamp = 1;
    string line = 2;
}

message Task {
    string id = 1;
    string name = 2;
    string status = 3;
    string tailscale_hostname = 4;
    string created_at = 5;
    string stopped_at = 6;
}

message Snapshot {
    string name = 1;
    string label = 2;
    string created_at = 3;
}

// Queue management messages
message CreateQueueRequest {
    string task_id = 1;
    string queue_name = 2;
    string mode = 3;  // "serial" or "concurrent", default "serial"
}
message CreateQueueResponse {}

message ListQueuesRequest {
    string task_id = 1;
}
message ListQueuesResponse {
    repeated QueueInfo queues = 1;
}

message GetQueueStatusRequest {
    string task_id = 1;
    string queue_name = 2;
}
message GetQueueStatusResponse {
    QueueInfo queue = 1;
    repeated CommandInfo commands = 2;
}

message FlushQueueRequest {
    string task_id = 1;
    string queue_name = 2;
}
message FlushQueueResponse {}

message ResumeQueueRequest {
    string task_id = 1;
    string queue_name = 2;
}
message ResumeQueueResponse {}

message DestroyQueueRequest {
    string task_id = 1;
    string queue_name = 2;
}
message DestroyQueueResponse {}

// Command execution messages
message QueueCommandRequest {
    string task_id = 1;
    string queue_name = 2;
    repeated string command = 3;
    map<string, string> env = 4;
    bool stop_on_failure = 5;
}
message QueueCommandResponse {
    string command_id = 1;
}

message GetCommandStatusRequest {
    string command_id = 1;
}
message GetCommandStatusResponse {
    CommandInfo command = 1;
}

message StreamCommandOutputRequest {
    string command_id = 1;
    bool follow = 2;
}
message CommandOutputChunk {
    bytes data = 1;
}

message StreamQueueOutputRequest {
    string task_id = 1;
    string queue_name = 2;
    bool follow = 3;
}
message QueueOutputChunk {
    bytes data = 1;
    string command_id = 2;  // set on first chunk of each command for client-side headers
}

// Shared info types
message QueueInfo {
    string name = 1;
    string mode = 2;
    bool protected = 3;
    string status = 4;
}

message CommandInfo {
    string id = 1;
    string queue_name = 2;
    repeated string command = 3;
    string status = 4;
    int32 exit_code = 5;
    bool stop_on_failure = 6;
    string created_at = 7;
    string started_at = 8;
    string finished_at = 9;
}
