name: Build and Upload

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-1
  ARTIFACTS_BUCKET: terminus-deploy-artifacts
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Determine what changed to decide which jobs to run
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      vm_image: ${{ steps.filter.outputs.vm_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for vm-image changes
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^vm-image/'; then
            echo "vm_image=true" >> $GITHUB_OUTPUT
          else
            echo "vm_image=false" >> $GITHUB_OUTPUT
          fi

  # Always runs — builds Go binaries
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build binaries
        run: make build

      - name: Build stockyard-shell
        run: make build-shell

      - name: Upload binaries to S3
        run: |
          SHA="${{ github.sha }}"
          PREFIX="s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/${SHA}"

          aws s3 cp bin/stockyardd "${PREFIX}/stockyardd"
          aws s3 cp bin/stockyard "${PREFIX}/stockyard"

      - name: Upload binaries as workflow artifact
        uses: actions/upload-artifact@v4
        if: needs.changes.outputs.vm_image == 'true'
        with:
          name: stockyard-shell
          path: vm-image/scripts/stockyard-shell/stockyard-shell

  # Only runs when vm-image/ files change
  vm-image:
    name: Build VM Image
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.vm_image == 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download stockyard-shell
        uses: actions/download-artifact@v4
        with:
          name: stockyard-shell
          path: vm-image/scripts/stockyard-shell/

      - name: Build VM image
        run: |
          chmod +x vm-image/scripts/stockyard-shell/stockyard-shell
          cd vm-image
          ./build.sh
          sudo ./convert-to-rootfs.sh

      - name: Upload VM image to S3
        run: |
          SHA="${{ github.sha }}"
          PREFIX="s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/${SHA}"

          aws s3 cp vm-image/output/rootfs.ext4 "${PREFIX}/rootfs.ext4"
          aws s3 cp vm-image/output/vmlinux.bin "${PREFIX}/vmlinux.bin"

  # Copy previous VM image when vm-image/ didn't change
  carry-forward:
    name: Carry Forward VM Image
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.vm_image == 'false'
    timeout-minutes: 5

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Copy VM image from previous release
        run: |
          SHA="${{ github.sha }}"
          PREFIX="s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/${SHA}"

          # Get the previous latest SHA
          PREV=$(aws s3 cp "s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/latest" - 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            echo "::warning::No previous release found — VM image will be missing. Push a vm-image/ change to build one."
            exit 0
          fi

          PREV_PREFIX="s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/${PREV}"
          aws s3 cp "${PREV_PREFIX}/rootfs.ext4" "${PREFIX}/rootfs.ext4"
          aws s3 cp "${PREV_PREFIX}/vmlinux.bin" "${PREFIX}/vmlinux.bin"

  # Update the latest pointer after everything succeeds
  finalize:
    name: Update Latest
    runs-on: ubuntu-latest
    needs: [build, vm-image, carry-forward]
    if: always() && needs.build.result == 'success' && (needs.vm-image.result == 'success' || needs.carry-forward.result == 'success')
    timeout-minutes: 2

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update latest pointer
        run: |
          SHA="${{ github.sha }}"
          echo -n "${SHA}" | aws s3 cp - "s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/latest"

          echo "### Artifacts uploaded" >> $GITHUB_STEP_SUMMARY
          echo "Version: \`${SHA}\`" >> $GITHUB_STEP_SUMMARY
