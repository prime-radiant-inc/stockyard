name: Build and Upload

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-1
  ARTIFACTS_BUCKET: terminus-deploy-artifacts
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Determine what changed to decide which jobs to run
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      vm_image: ${{ steps.filter.outputs.vm_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for vm-image changes
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^vm-image/'; then
            echo "vm_image=true" >> $GITHUB_OUTPUT
          else
            echo "vm_image=false" >> $GITHUB_OUTPUT
          fi

  # Always runs — builds Go binaries
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build binaries
        run: make build

      - name: Build VM binaries
        run: make build-vm

      - name: Upload binaries to S3
        run: |
          SHA="${{ github.sha }}"
          tar czf stockyard-binaries.tar.gz -C bin stockyardd stockyard stockyard-shell stockyard-snapshot

          aws s3 cp stockyard-binaries.tar.gz \
            "s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/binaries/${SHA}/stockyard-binaries.tar.gz"

          echo -n "${SHA}" | aws s3 cp - "s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/latest-binaries"

          echo "### Binaries uploaded" >> $GITHUB_STEP_SUMMARY
          echo "Version: \`${SHA}\`" >> $GITHUB_STEP_SUMMARY

  # Only runs when vm-image/ files change
  vm-image:
    name: Build VM Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.vm_image == 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build VM image
        run: |
          cd vm-image
          ./build.sh
          sudo ./convert-to-rootfs.sh

      - name: Upload VM image to S3
        run: |
          SHA="${{ github.sha }}"
          PREFIX="s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/vm-image/${SHA}"

          aws s3 cp vm-image/output/rootfs.ext4 "${PREFIX}/rootfs.ext4"
          aws s3 cp vm-image/output/vmlinux.bin "${PREFIX}/vmlinux.bin"

          echo -n "${SHA}" | aws s3 cp - "s3://${{ env.ARTIFACTS_BUCKET }}/stockyard/latest-vm-image"

          echo "### VM image uploaded" >> $GITHUB_STEP_SUMMARY
          echo "Version: \`${SHA}\`" >> $GITHUB_STEP_SUMMARY
